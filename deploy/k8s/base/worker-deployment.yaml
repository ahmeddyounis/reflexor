apiVersion: apps/v1
kind: Deployment
metadata:
  name: reflexor-worker
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: reflexor
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: reflexor
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: reflexor
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: reflexor
          image: reflexor:1.0.0
          imagePullPolicy: IfNotPresent
          args: ["reflexor", "run", "worker", "--concurrency", "4"]
          envFrom:
            - configMapRef:
                name: reflexor-config
            - secretRef:
                name: reflexor-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: tmp
          emptyDir: {}
        - name: workspace
          persistentVolumeClaim:
            claimName: reflexor-workspace
