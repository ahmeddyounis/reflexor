apiVersion: batch/v1
kind: Job
metadata:
  name: reflexor-db-migrate
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: reflexor
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      serviceAccountName: reflexor
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: reflexor
          image: reflexor:1.0.0
          imagePullPolicy: IfNotPresent
          args: ["python", "-m", "reflexor.infra.db.migrate", "upgrade"]
          envFrom:
            - configMapRef:
                name: reflexor-config
            - secretRef:
                name: reflexor-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
