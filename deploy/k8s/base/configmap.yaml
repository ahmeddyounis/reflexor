apiVersion: v1
kind: ConfigMap
metadata:
  name: reflexor-config
data:
  REFLEXOR_PROFILE: "prod"
  REFLEXOR_DRY_RUN: "true"
  REFLEXOR_EVENTS_REQUIRE_ADMIN: "true"
  REFLEXOR_LOG_LEVEL: "INFO"
  REFLEXOR_QUEUE_BACKEND: "redis_streams"
  REFLEXOR_REDIS_STREAM_KEY: "reflexor:tasks"
  REFLEXOR_REDIS_CONSUMER_GROUP: "reflexor"
  REFLEXOR_REDIS_STREAM_MAXLEN: "50000"
  REFLEXOR_REDIS_DELAYED_ZSET_KEY: "reflexor:tasks:delayed"
  REFLEXOR_ENABLED_SCOPES: '["fs.read"]'
  REFLEXOR_APPROVAL_REQUIRED_SCOPES: '[]'
  REFLEXOR_HTTP_ALLOWED_DOMAINS: '[]'
  REFLEXOR_WEBHOOK_ALLOWED_TARGETS: '[]'
  REFLEXOR_WORKSPACE_ROOT: "/workspace"
  REFLEXOR_EVENT_SUPPRESSION_ENABLED: "true"
  REFLEXOR_EVENT_SUPPRESSION_WINDOW_S: "60"
  REFLEXOR_EVENT_SUPPRESSION_THRESHOLD: "50"
  REFLEXOR_EVENT_SUPPRESSION_TTL_S: "300"
  REFLEXOR_RATE_LIMITS_ENABLED: "true"
  REFLEXOR_PLANNER_BACKEND: "heuristic"
  REFLEXOR_MAINTENANCE_BATCH_SIZE: "200"
  REFLEXOR_MEMORY_RETENTION_DAYS: "30"
  REFLEXOR_ARCHIVE_TERMINAL_TASKS_AFTER_DAYS: "30"
