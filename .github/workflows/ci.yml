name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: Unit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Ruff format (check)
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Mypy
        run: mypy src

      - name: Pytest (unit)
        run: pytest --cov=reflexor.domain --ignore=tests/integration

      - name: Upload coverage.xml
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  integration:
    name: Integration (Postgres + Redis)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: reflexor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d reflexor_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev,postgres,redis]"

      - name: DB upgrade
        run: |
          python scripts/db_upgrade.py --database-url \
            postgresql+asyncpg://postgres:postgres@localhost:5432/reflexor_test

      - name: Pytest (integration)
        env:
          TEST_POSTGRES_DSN: postgresql+asyncpg://postgres:postgres@localhost:5432/reflexor_test
          TEST_REDIS_URL: redis://localhost:6379/0
        run: |
          pytest -q tests/integration

  advisory-audit:
    name: Security audit (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Prepare reports
        run: mkdir -p advisory

      - name: Install dependencies (including audit tool)
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
          python -m pip install pip-audit==2.9.0

      - name: Dependency update report (advisory)
        run: |
          python -m pip list --outdated > advisory/pip-outdated.txt
          python -m pip freeze > advisory/pip-freeze.txt

      - name: pip-audit (report)
        run: |
          set +e
          pip-audit \
            -s osv \
            -f json \
            --desc off \
            --aliases on \
            --progress-spinner off \
            -o advisory/pip-audit.json
          audit_exit=$?
          pip-audit -s osv --progress-spinner off -o advisory/pip-audit.txt
          echo "$audit_exit" > advisory/pip-audit.exitcode
          set -e

      - name: pip-audit (gate high/critical)
        run: |
          python scripts/pip_audit_gate.py \
            --audit-json advisory/pip-audit.json \
            --allowlist .github/pip-audit-allowlist.txt \
            --min-severity high

      - name: Upload advisory reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: advisory-audit
          path: advisory

  deploy-artifacts:
    name: Deploy Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev,postgres,redis]"

      - name: Validate Kubernetes manifests
        run: |
          python scripts/validate_k8s_manifests.py deploy/k8s

      - name: Validate production preflight example
        env:
          REFLEXOR_PROFILE: prod
          REFLEXOR_ADMIN_API_KEY: test-admin-key
          REFLEXOR_EVENTS_REQUIRE_ADMIN: "true"
          REFLEXOR_DATABASE_URL: postgresql+asyncpg://user:pass@example.com:5432/reflexor
          REFLEXOR_QUEUE_BACKEND: redis_streams
          REFLEXOR_REDIS_URL: redis://redis.example.com:6379/0
          REFLEXOR_REDIS_STREAM_MAXLEN: "10000"
          REFLEXOR_EVENT_SUPPRESSION_ENABLED: "true"
          REFLEXOR_RATE_LIMITS_ENABLED: "true"
          REFLEXOR_OTEL_ENABLED: "true"
          REFLEXOR_REFLEX_RULES_PATH: /tmp/reflex_rules.yaml
        run: |
          printf 'rules: []\n' > /tmp/reflex_rules.yaml
          reflexor config validate --strict --json

      - name: Build runtime image
        run: |
          docker build -f docker/Dockerfile -t reflexor:test .
