name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Ruff format (check)
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Mypy
        run: mypy src

      - name: Pytest (with coverage)
        run: pytest --cov

      - name: Upload coverage.xml
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  advisory-audit:
    name: Advisory audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Prepare reports
        run: mkdir -p advisory

      - name: Install dependencies (including audit tool)
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
          python -m pip install pip-audit

      - name: Dependency update report (advisory)
        run: |
          python -m pip list --outdated > advisory/pip-outdated.txt
          python -m pip freeze > advisory/pip-freeze.txt

      - name: pip-audit (advisory)
        continue-on-error: true
        run: |
          set +e
          pip-audit -f json > advisory/pip-audit.json
          audit_exit=$?
          pip-audit > advisory/pip-audit.txt
          echo "$audit_exit" > advisory/pip-audit.exitcode
          exit "$audit_exit"

      - name: Upload advisory reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: advisory-audit
          path: advisory
